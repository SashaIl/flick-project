services:

  frontend:
    build:
      context: ./ui/movies_service_ui
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network

  backend:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "7159:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - SqlConnectionString=Server=mssql,1433;Database=MovieApp;User Id=sa;Password=FlickGuide2026!;TrustServerCertificate=True;
    depends_on:
      mssql:
        condition: service_healthy
    networks:
      - app-network

  ai-service:
    build:
      context: ./ai
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    networks:
      - app-network

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=FlickGuide2026!
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P FlickGuide2026! -Q 'SELECT 1' -No"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mssql_data:
